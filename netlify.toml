    Cache-Control = "public, max-age=3600"

# Additional redirects for better SEO
[[redirects]]
  from = "/api/midi-search"
  to = "/.netlify/functions/midi-search"
  status = 200
  force = true

[[redirects]]
  from = "/api/midi-object"
  to = "/.netlify/functions/midi-object"
  status = 200
  force = true

# SPA Redirect - Must be at the bottom
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  
  # Prerender for search engine bots
  conditions = {User-Agent = ["!googlebot", "!bingbot", "!yandex", "!baiduspider", "!slurp", "!duckduckbot", "!facebookexternalhit", "!twitterbot", "!linkedinbot", "!whatsapp"]}

# Enable Prerendering for SEO (if using Netlify's built-in or third-party service)
[build]
  command = "npm run build"
  publish = "dist"

# Build settings
[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# Functions configuration (for future dynamic sitemap)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true
